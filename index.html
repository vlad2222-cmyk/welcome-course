<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Studio · Pasul 3</title>
<style>
  :root{
    --indigo:#5b5ef0;
    --indigo-dark:#4f52e8;
    --orange:#f4793b;
    --orange-grad-a:#f7864a;
    --orange-grad-b:#ef5f2e;
    --ink:#1e2235;
    --muted:#8a90a6;
    --muted-2:#9aa0b5;
    --page:#eef0f8;
    --card:#ffffff;
    --dark:#0f1530;
    --phone-bg:#eaf1fb;
    --tile:#f4f6fb;
    --line:#e6e8f2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--page);
    color:var(--ink);
    padding:0 0 40px;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 40px;
    background:#fff;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-logo{
    width:46px;height:46px;border-radius:13px;
    background:linear-gradient(135deg,#6d6ff5,#5457ec);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:20px;
    box-shadow:0 6px 14px rgba(91,94,240,.35);
  }
  .brand-name{font-size:20px;font-weight:800;letter-spacing:-.3px;}
  .brand-sub{font-size:13px;color:var(--muted);margin-top:1px;}
  .step-pill{
    background:#eceaff;color:var(--indigo);
    font-weight:700;font-size:14px;
    padding:11px 20px;border-radius:12px;
  }

  /* ---------- Stepper ---------- */
  .stepper{
    max-width:1320px;margin:34px auto 0;padding:0 60px;
    display:flex;align-items:flex-start;
  }
  .step{display:flex;flex-direction:column;align-items:center;gap:10px;flex:0 0 auto;}
  .bubble{
    width:48px;height:48px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:17px;
    background:#fff;border:2px solid var(--line);color:var(--muted-2);
  }
  .bubble.done{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  .bubble.active{background:var(--indigo);border-color:var(--indigo);color:#fff;
    box-shadow:0 0 0 5px rgba(91,94,240,.16);}
  .step-label{font-size:15px;color:var(--muted);font-weight:500;}
  .step.active .step-label{color:var(--ink);font-weight:700;}
  .connector{flex:1;height:4px;border-radius:4px;background:var(--line);margin-top:22px;}
  .connector.filled{background:var(--indigo);}

  /* ---------- Main panel ---------- */
  .panel{
    max-width:1320px;margin:26px auto 0;
    background:#fff;border-radius:26px;
    padding:34px 40px 40px;
    box-shadow:0 24px 60px rgba(30,34,53,.07);
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--indigo);font-weight:800;font-size:13px;letter-spacing:1.2px;
    margin-bottom:14px;
  }
  .eyebrow svg{width:16px;height:16px;}
  h1{font-size:38px;font-weight:800;letter-spacing:-.8px;margin-bottom:10px;}
  .lede{font-size:18px;color:var(--muted);margin-bottom:26px;}

  .var-toggle{display:flex;gap:18px;margin-bottom:26px;}
  .var-btn{
    padding:14px 34px;border-radius:14px;font-weight:700;font-size:16px;
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;gap:9px;
  }
  .var-btn.sel{background:var(--indigo);color:#fff;border-color:var(--indigo);
    box-shadow:0 10px 22px rgba(91,94,240,.32);}
  .var-btn svg{width:18px;height:18px;}

  /* ---------- Dark stage ---------- */
  .stage{
    background:var(--dark);border-radius:22px;
    padding:24px 34px 40px;
    display:grid;grid-template-columns:1fr 1fr;gap:60px;
  }
  .col-head{display:flex;align-items:center;justify-content:space-between;
    margin:6px 6px 18px;}
  .col-title{color:#cfd3e6;font-weight:600;font-size:16px;}
  .sel-badge{
    background:var(--indigo);color:#fff;font-weight:700;font-size:13px;
    padding:7px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;
  }
  .sel-badge svg{width:14px;height:14px;}

  /* ---------- Phone card ---------- */
  .phone{
    background:var(--phone-bg);border-radius:30px;padding:18px;
  }
  .phone-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .circ{
    width:44px;height:44px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 10px rgba(20,30,60,.08);color:var(--ink);
  }
  .circ.fav{background:var(--orange);color:#fff;}
  .circ svg{width:18px;height:18px;}
  .phone-name{font-weight:800;font-size:21px;}

  .hero{
    position:relative;border-radius:22px;overflow:hidden;height:300px;
    background:
      radial-gradient(120% 90% at 30% 20%, #bfe0f5 0%, rgba(191,224,245,0) 55%),
      linear-gradient(180deg,#9fd0ef 0%,#f4b15f 55%,#e8863c 100%);
  }
  .hero-dragon{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:160px;filter:drop-shadow(0 10px 20px rgba(120,40,0,.35));
  }
  .hero-glow{
    position:absolute;left:0;right:0;bottom:0;height:55%;
    background:linear-gradient(180deg,rgba(232,134,60,0) 0%, rgba(120,40,0,.45) 100%);
  }
  .tag-fab{
    position:absolute;top:16px;left:16px;
    background:#e53935;color:#fff;font-weight:700;font-size:13px;
    padding:8px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;
    box-shadow:0 6px 14px rgba(229,57,53,.35);
  }
  .tag-fab svg{width:14px;height:14px;}
  .hero-flame{
    position:absolute;top:16px;right:16px;
    width:40px;height:40px;border-radius:50%;
    background:rgba(255,255,255,.28);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .hero-title{position:absolute;left:20px;bottom:18px;color:#fff;}
  .hero-title h3{font-size:26px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.4);}
  .hero-title p{font-size:13px;opacity:.95;margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,.4);}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
  .stat{background:#fff;border-radius:16px;padding:16px 10px;text-align:center;}
  .stat-ic{
    width:38px;height:38px;border-radius:11px;margin:0 auto 10px;
    display:flex;align-items:center;justify-content:center;
  }
  .stat-ic svg{width:18px;height:18px;}
  .ic-atac{background:#fde6da;color:#f4793b;}
  .ic-viata{background:#fbdde6;color:#ec5f87;}
  .ic-aur{background:#fceecc;color:#e0a92e;}
  .stat-num{font-size:22px;font-weight:800;}
  .stat-lab{font-size:14px;color:var(--muted);margin-top:3px;}

  /* despre */
  .box{background:#fff;border-radius:18px;padding:20px 22px;margin-top:14px;}
  .box h4{font-size:18px;font-weight:800;margin-bottom:10px;}
  .box p{font-size:15px;color:#737a90;line-height:1.55;}

  .maestrii-head{display:flex;align-items:center;justify-content:space-between;
    margin:18px 4px 12px;}
  .maestrii-head h4{font-size:18px;font-weight:800;}
  .maestrii-head span{color:var(--orange);font-weight:700;font-size:15px;}

  .skill{background:#fff;border-radius:18px;padding:18px;display:flex;gap:14px;margin-bottom:12px;}
  .skill-ic{
    width:50px;height:50px;border-radius:14px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .skill-ic svg{width:22px;height:22px;}
  .ic-foc{background:linear-gradient(135deg,#f7864a,#ef5f2e);}
  .ic-prim{background:linear-gradient(135deg,#f56fa0,#ef5f87);}
  .skill-title{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .skill-title b{font-size:16px;}
  .chip{font-size:12px;font-weight:700;padding:4px 11px;border-radius:14px;}
  .chip-foc{background:#fde6da;color:#ef5f2e;}
  .chip-prim{background:#fbdde6;color:#ec5f87;}
  .skill p{font-size:14px;color:#737a90;line-height:1.5;}

  .cta{
    margin-top:8px;width:100%;border:none;cursor:pointer;
    background:linear-gradient(135deg,#f7864a,#ef5f2e);
    color:#fff;font-weight:700;font-size:16px;
    padding:18px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 12px 24px rgba(239,95,46,.35);
  }
  .cta svg{width:18px;height:18px;}

  /* ---------- Footer nav ---------- */
  .footnav{max-width:1320px;margin:30px auto 0;padding:0 6px;
    display:flex;align-items:center;justify-content:space-between;}
  .nav-btn{
    display:flex;align-items:center;gap:10px;cursor:pointer;
    font-weight:700;font-size:16px;padding:16px 30px;border-radius:14px;border:none;
  }
  .nav-back{background:#fff;color:var(--ink);border:1px solid var(--line);
    box-shadow:0 6px 16px rgba(30,34,53,.06);}
  .nav-next{background:var(--indigo);color:#fff;
    box-shadow:0 12px 24px rgba(91,94,240,.32);}
  .nav-btn svg{width:18px;height:18px;}

  @media(max-width:900px){
    .stage{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div>
        <div class="brand-name">Persona Studio</div>
        <div class="brand-sub">Constructor de persona</div>
      </div>
    </div>
    <div class="step-pill">Pasul 3 din 4</div>
  </div>

  <!-- Stepper -->
  <div class="stepper">
    <div class="step">
      <div class="bubble done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="step-label">Profil</div>
    </div>
    <div class="connector filled"></div>
    <div class="step">
      <div class="bubble done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="step-label">Nevoia</div>
    </div>
    <div class="connector filled"></div>
    <div class="step active">
      <div class="bubble active">3</div>
      <div class="step-label">Idei</div>
    </div>
    <div class="connector"></div>
    <div class="step">
      <div class="bubble">4</div>
      <div class="step-label">Rezumat</div>
    </div>
  </div>

  <!-- Main panel -->
  <div class="panel">
    <div class="eyebrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      ALEGERI DESIGN
    </div>
    <h1>Alege varianta de homepage</h1>
    <p class="lede">Compară cele două variante și selecteaz-o pe cea preferată.</p>

    <div class="var-toggle">
      <button class="var-btn">Var 1</button>
      <button class="var-btn sel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11.5 14.5 16 9.5"/></svg>
        Var 2
      </button>
    </div>

    <!-- Dark stage with two variants -->
    <div class="stage">
      <!-- VARIANT 1 -->
      <div class="variant">
        <div class="col-head">
          <div class="col-title">Varianta 1</div>
        </div>
        <!-- phone -->
        <div class="phone"></div>
      </div>

      <!-- VARIANT 2 -->
      <div class="variant">
        <div class="col-head">
          <div class="col-title">Varianta 2</div>
          <div class="sel-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Selectat
          </div>
        </div>
        <div class="phone"></div>
      </div>
    </div>
  </div>

  <!-- Footer nav -->
  <div class="footnav">
    <button class="nav-btn nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Înapoi
    </button>
    <button class="nav-btn nav-next">
      Înainte
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>

  <!-- Phone template rendered by JS into both .phone containers -->
  <script>
    const phoneHTML = `
      <div class="phone-top">
        <div class="circ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
        <div class="phone-name">Adam</div>
        <div class="circ fav"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.1 2 4.5 5.5 4.5c2 0 3.3 1.1 4 2.2.7-1.1 2-2.2 4-2.2C17 4.5 18.6 8.1 17 11.7 14.5 16.4 12 21 12 21z"/></svg></div>
      </div>

      <div class="hero">
        <div class="hero-dragon">🐉</div>
        <div class="hero-glow"></div>
        <div class="tag-fab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg>
          Fabulos
        </div>
        <div class="hero-flame"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-2 4-2 7a3 3 0 0 0 6 0c0-1 .5 1 .5 2A6.5 6.5 0 1 1 6 8c2-1 5-3 6-6z"/></svg></div>
        <div class="hero-title">
          <h3>Dragon de Foc</h3>
          <p>Nivel 24 · Piscurile Vulcanice din Dragolandia</p>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-ic ic-atac"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg></div>
          <div class="stat-num">512</div><div class="stat-lab">Atac</div>
        </div>
        <div class="stat">
          <div class="stat-ic ic-viata"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.1 2 4.5 5.5 4.5c2 0 3.3 1.1 4 2.2.7-1.1 2-2.2 4-2.2C17 4.5 18.6 8.1 17 11.7 14.5 16.4 12 21 12 21z"/></svg></div>
          <div class="stat-num">1.240</div><div class="stat-lab">Viață</div>
        </div>
        <div class="stat">
          <div class="stat-ic ic-aur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5c-.7-.7-1.7-1-2.5-1-1.5 0-2.5.8-2.5 2s1.5 1.5 2.5 1.8 2.5.7 2.5 2-1 2-2.5 2c-.9 0-1.9-.4-2.6-1.1M12 7v10" stroke-linecap="round"/></svg></div>
          <div class="stat-num">86/h</div><div class="stat-lab">Aur</div>
        </div>
      </div>

      <div class="box">
        <h4>Despre</h4>
        <p>Adam este un Dragon de Foc, al cărui temperament arde la fel de strălucitor ca solzii săi. Făurit în piscurile vulcanice din Dragolandia, această bestie Fabuloasă transformă flacăra pură în atacuri devastatoare, pârjolindu-și dușmanii cu mult înainte ca aceștia să riposteze.</p>
      </div>

      <div class="maestrii-head">
        <h4>Maestrii</h4>
        <span>Academia Dragonilor</span>
      </div>

      <div class="skill">
        <div class="skill-ic ic-foc"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-2 4-2 7a3 3 0 0 0 6 0c0-1 .5 1 .5 2A6.5 6.5 0 1 1 6 8c2-1 5-3 6-6z"/></svg></div>
        <div>
          <div class="skill-title"><b>Rezultate Explozive</b><span class="chip chip-foc">Foc</span></div>
          <p>Dezlănțuie o explozie de flăcări, provocând daune mari de foc fiecărui inamic de pe câmp.</p>
        </div>
      </div>

      <div class="skill">
        <div class="skill-ic ic-prim"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c4 5 6 8 6 11a6 6 0 0 1-12 0c0-3 2-6 6-11z"/></svg></div>
        <div>
          <div class="skill-title"><b>Putere Sporita</b><span class="chip chip-prim">Primordial</span></div>
          <p>Crește daunele provocate de Adam. Risc mare, recompensă mare.</p>
        </div>
      </div>

      <button class="cta">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.5-2 4-2 5 0 .8 1.6-.2 3.4-5 6-4.8-2.6-5.8-4.4-5-6 1-2 3.5-2 5 0z"/><circle cx="5" cy="6" r="1.6"/><circle cx="19" cy="6" r="1.6"/><circle cx="3.5" cy="10" r="1.4"/><circle cx="20.5" cy="10" r="1.4"/></svg>
        Cheamă-I pe Adam în luptă
      </button>
    `;
    document.querySelectorAll('.phone').forEach(p => p.innerHTML = phoneHTML);
  </script>

</body>
</html>
